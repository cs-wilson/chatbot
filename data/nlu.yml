version: "2.0"
nlu:
- intent: greet
  examples: |
    - 您好
    - 你好
    - 早上好
    - 中午好
    - 下午好
    - 晚上好
- intent: goodbye
  examples: |
    - 再见
    - 感谢您的回复，再见
    - 拜拜
    - 下次见
- intent: affirm
  examples: |
    - 好的
    - 没问题
    - 可以的
    - 是的
    - 当然
    - 可
    - 行
    - 不错
- intent: deny
  examples: |
    - 不行
    - 不对
    - 不喜欢
    - 拒绝
    - 我不觉得
- intent: mood_great
  examples: |
    - 太棒了
    - 很稳
    - 太好吃了
    - 没吃过这么好吃的
    - 听上去就不错
    - 彩
    - 好吃
- intent: mood_unhappy
  examples: |
    - 太难吃了
    - 不想吃
    - 恶心
    - 不开心
    - 伤心
    - 不太好
- intent: foodmenu
  examples: |
    - 我想吃[麻婆豆腐](food_menu)
    - 我要吃[麻婆豆腐](food_menu)
    - 我喜欢吃[麻婆豆腐](food_menu)
    - 我们点[麻婆豆腐](food_menu) 这道菜吧
    - 可以，[麻婆豆腐](food_menu)不错
    - 我想吃火锅
- intent: foodmenudemo
  examples: |
    - 我想吃鱼香肉丝
- intent: hungry_request
  examples: |
    - 我饿了
    - 我想吃饭了
    - 妈妈喊我回家吃饭
- intent: bot_challenge
  examples: |
    - 你是机器人吗？
    - 你是不是人类？
    - 对面是机器人吗？
- intent: human_service
  examples: |
    - 人工服务
    - 转人工
    - 有真人解答吗？
- intent: test
  examples: |
    - 测试
- synonym: 肉丝
  examples: |
    - 肉片
    - 炒肉
    - 肉块
- lookup: food_menu
  examples:  |
    - 火锅
    - 麻婆豆腐
    - 红烧肉
    - 烧烤